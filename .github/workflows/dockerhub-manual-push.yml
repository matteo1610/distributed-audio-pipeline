name: Manual Docker Hub Push

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (for example: latest, v1.0.0)"
        required: true
        default: latest
        type: string

jobs:
  push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: distributed-audio-api
            context: ./srcs/app
            dockerfile: ./srcs/app/Dockerfile
          - image_name: distributed-audio-worker
            context: ./srcs
            dockerfile: ./srcs/worker/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}:${{ inputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}:sha-${{ github.sha }}