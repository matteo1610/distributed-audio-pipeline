global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["{{ include "obs.fullname" . }}-prometheus:{{ .Values.prometheus.service.port }}"]

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["{{ .Values.prometheus.scrapeTargets.api }}"]

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets: ["{{ .Values.prometheus.scrapeTargets.worker }}"]
