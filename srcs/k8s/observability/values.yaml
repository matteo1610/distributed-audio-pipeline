prometheus:
  image:
    repository: prom/prometheus
    tag: v2.55.1
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9090
    nodePort: 30909
  scrapeTargets:
    api: dap-api:8000
    worker: dap-worker-metrics:9100

grafana:
  image:
    repository: grafana/grafana
    tag: 11.2.0
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
    nodePort: 30300
  adminUser: admin
  adminPassword: admin

storage:
  prometheus:
    enabled: true
    size: 2Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
  grafana:
    enabled: true
    size: 1Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""

