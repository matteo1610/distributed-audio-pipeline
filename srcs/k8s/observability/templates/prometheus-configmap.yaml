apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "obs.fullname" . }}-prometheus-config
  labels:
    {{- include "obs.baseLabels" . | nindent 4 }}
data:
  prometheus.yml: |
{{ tpl (.Files.Get "files/prometheus.yml") . | nindent 4 }}
  alerts.yml: |
{{ tpl (.Files.Get "files/alerts.yml") . | nindent 4 }}
