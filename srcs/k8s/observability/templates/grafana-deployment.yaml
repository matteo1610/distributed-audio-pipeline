apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "obs.fullname" . }}-grafana
  labels:
    {{- include "obs.baseLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "obs.baseLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.grafana.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.grafana.service.port }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.grafana.adminPassword | quote }}
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
          volumeMounts:
            - name: datasource
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
            - name: dashboard
              mountPath: /var/lib/grafana/dashboards/distributed-audio-overview.json
              subPath: distributed-audio-overview.json
            - name: data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: datasource
          configMap:
            name: {{ include "obs.fullname" . }}-grafana-datasource
        - name: dashboards-provider
          configMap:
            name: {{ include "obs.fullname" . }}-grafana-dashboards
        - name: dashboard
          configMap:
            name: {{ include "obs.fullname" . }}-grafana-dashboard-distributed-audio-overview
        - name: data
          {{- if .Values.storage.grafana.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "obs.fullname" . }}-grafana-data
          {{- else }}
          emptyDir: {}
          {{- end }}
