kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      - containerPort: 30080
        hostPort: 8000
        protocol: TCP
      - containerPort: 30156
        hostPort: 15672
        protocol: TCP
      - containerPort: 30090
        hostPort: 9000
        protocol: TCP
      - containerPort: 30091
        hostPort: 9001
        protocol: TCP
      - containerPort: 30110
        hostPort: 9100
        protocol: TCP
      - containerPort: 30909
        hostPort: 9090
        protocol: TCP
      - containerPort: 30300
        hostPort: 3000
        protocol: TCP
